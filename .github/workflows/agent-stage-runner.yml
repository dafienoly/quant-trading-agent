name: Agent Stage Runner

run-name: >-
  ${{ inputs.stage || github.event.label.name || 'unknown-stage' }}
  / PR #${{ inputs.pr_number || github.event.pull_request.number || '' }}

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      stage:
        description: Stage to run
        required: true
        type: choice
        options:
          - runtime_preflight
          - claude_lead_plan
          - claude_developer
          - claude_tester
          - claude_lead_review
          - bugfix
          - codex_reviewer
          - codex_pm
          - codex_architect
          - codex_acceptance
          - postmortem
      runtime_role:
        description: Runtime role to probe when stage is runtime_preflight
        required: false
        default: all
        type: choice
        options:
          - all
          - lead
          - tester
          - developer
      pr_number:
        description: Pull request number for label advancement when dispatched by another workflow
        required: false
      dry_run:
        description: Generate handoff only
        required: false
        default: "false"

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-stage-pr-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}-${{ github.event.label.name || inputs.stage }}
  cancel-in-progress: true

defaults:
  run:
    shell: powershell

jobs:
  run-stage:
    if: >-
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.stage != 'runtime_preflight'
      ) ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        startsWith(github.event.pull_request.head.ref, 'epic/') &&
        contains(fromJson('["stage:pm-pending","stage:arch-pending","stage:team-plan-pending","stage:team-dev-pending","stage:team-test-pending","stage:claude-lead-review-pending","stage:fix-pending","stage:codex-review-pending","stage:pm-acceptance-pending","stage:postmortem-pending"]'), github.event.label.name)
      )
    runs-on: [self-hosted, Windows, X64, local-windows-codex]
    steps:
      - name: Determine checkout ref for dispatching PR
        id: checkout-ref
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $pr = "${{ inputs.pr_number }}"
          $branch = gh pr view $pr --json headRefName --jq ".headRefName"
          if ($LASTEXITCODE -ne 0 -or -not $branch) { exit 2 }
          "checkout_ref=$branch" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        if: steps.checkout-ref.outputs.checkout_ref != ''
        run: |
          $ErrorActionPreference = "Stop"
          $branch = "${{ steps.checkout-ref.outputs.checkout_ref }}"
          git fetch origin "$branch"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git checkout "$branch"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git pull origin "$branch"
          if ($LASTEXITCODE -ne 0) { Write-Host "git pull failed (may be up to date); continuing." }

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight pipeline dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Validate dispatched PR is open and matches ref
        if: github.event_name == 'workflow_dispatch' && inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ inputs.pr_number }}"
          $expectedBranch = "${{ github.ref_name }}"
          $prState = gh pr view $pr --json number,state,headRefName,url | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0 -or -not $prState) {
            Write-Error "Could not load PR #$pr for stage dispatch."
            exit 2
          }
          if ($prState.state -ne "OPEN") {
            Write-Error "PR #$pr is '$($prState.state)', not OPEN. Failing closed."
            exit 2
          }
          if ($prState.headRefName -ne $expectedBranch) {
            Write-Error "PR #$pr head '$($prState.headRefName)' does not match workflow ref '$expectedBranch'."
            exit 2
          }

      - name: Determine stage
        id: stage
        run: |
          $ErrorActionPreference = "Stop"
          $stage = "${{ inputs.stage }}"
          $label = "${{ github.event.label.name || '' }}"
          if (-not $stage) {
            switch ($label) {
              "stage:pm-pending" { $stage = "codex_pm" }
              "stage:arch-pending" { $stage = "codex_architect" }
              "stage:team-plan-pending" { $stage = "claude_lead_plan" }
              "stage:team-dev-pending" { $stage = "claude_developer" }
              "stage:team-test-pending" { $stage = "claude_tester" }
              "stage:claude-lead-review-pending" { $stage = "claude_lead_review" }
              "stage:fix-pending" { $stage = "bugfix" }
              "stage:codex-review-pending" { $stage = "codex_reviewer" }
              "stage:pm-acceptance-pending" { $stage = "codex_acceptance" }
              "stage:postmortem-pending" { $stage = "postmortem" }
              default {
                Write-Error "Cannot infer stage from label '$label'"
                exit 2
              }
            }
          }

          python scripts/agent_pipeline.py write-handoff --stage $stage
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "stage=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run configured Agent command
        env:
          STAGE: ${{ steps.stage.outputs.stage }}
          AGENT_REAL_CODEX_REVIEWER: ${{ vars.AGENT_REAL_CODEX_REVIEWER || '' }}
          AGENT_REAL_CODEX_REVIEWER_STRICT: ${{ vars.AGENT_REAL_CODEX_REVIEWER_STRICT || '' }}
          AGENT_REAL_CODEX_PM: ${{ vars.AGENT_REAL_CODEX_PM || '' }}
          AGENT_REAL_CODEX_PM_STRICT: ${{ vars.AGENT_REAL_CODEX_PM_STRICT || '' }}
          AGENT_REAL_CODEX_ARCHITECT: ${{ vars.AGENT_REAL_CODEX_ARCHITECT || '' }}
          AGENT_REAL_CODEX_ARCHITECT_STRICT: ${{ vars.AGENT_REAL_CODEX_ARCHITECT_STRICT || '' }}
          AGENT_REAL_CODEX_ACCEPTANCE: ${{ vars.AGENT_REAL_CODEX_ACCEPTANCE || '' }}
          AGENT_REAL_CODEX_ACCEPTANCE_STRICT: ${{ vars.AGENT_REAL_CODEX_ACCEPTANCE_STRICT || '' }}
          CODEX_A_PM_AGENT_COMMAND: ${{ secrets.CODEX_A_PM_AGENT_COMMAND || vars.CODEX_A_PM_AGENT_COMMAND }}
          CODEX_B_ARCHITECT_AGENT_COMMAND: ${{ secrets.CODEX_B_ARCHITECT_AGENT_COMMAND || vars.CODEX_B_ARCHITECT_AGENT_COMMAND }}
          CODEX_B_REVIEW_AGENT_COMMAND: ${{ secrets.CODEX_B_REVIEW_AGENT_COMMAND || vars.CODEX_B_REVIEW_AGENT_COMMAND }}
          CODEX_A_ACCEPTANCE_AGENT_COMMAND: ${{ secrets.CODEX_A_ACCEPTANCE_AGENT_COMMAND || vars.CODEX_A_ACCEPTANCE_AGENT_COMMAND }}
          REVIEW_AGENT_COMMAND: ${{ secrets.REVIEW_AGENT_COMMAND || vars.REVIEW_AGENT_COMMAND }}
          ACCEPTANCE_AGENT_COMMAND: ${{ secrets.ACCEPTANCE_AGENT_COMMAND || vars.ACCEPTANCE_AGENT_COMMAND }}
          DRY_RUN: ${{ inputs.dry_run || contains(github.event.pull_request.labels.*.name, 'agent:dry-run') }}
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:DRY_RUN -eq "true" -or $env:DRY_RUN -eq "1") {
            Write-Host "Dry run: generated .agent/handoff/$env:STAGE.md"
            exit 0
          }

          switch ($env:STAGE) {
            "claude_lead_plan" { & .\scripts\run-team-stage.ps1 -Stage claude_lead_plan }
            "claude_developer" { & .\scripts\run-team-stage.ps1 -Stage claude_developer }
            "claude_tester" { & .\scripts\run-team-stage.ps1 -Stage claude_tester }
            "claude_lead_review" { & .\scripts\run-team-stage.ps1 -Stage claude_lead_review }
            "bugfix" { & .\scripts\run-team-stage.ps1 -Stage bugfix }
            "postmortem" { & .\scripts\run-team-stage.ps1 -Stage postmortem }
            "codex_pm" {
              $cmd = $env:CODEX_A_PM_AGENT_COMMAND
              if (-not $cmd) {
                Write-Error "CODEX_A_PM_AGENT_COMMAND is not configured."
                exit 2
              }
              Invoke-Expression $cmd
            }
            "codex_architect" {
              $cmd = $env:CODEX_B_ARCHITECT_AGENT_COMMAND
              if (-not $cmd) {
                Write-Error "CODEX_B_ARCHITECT_AGENT_COMMAND is not configured."
                exit 2
              }
              Invoke-Expression $cmd
            }
            "codex_reviewer" {
              $cmd = if ($env:CODEX_B_REVIEW_AGENT_COMMAND) { $env:CODEX_B_REVIEW_AGENT_COMMAND } else { $env:REVIEW_AGENT_COMMAND }
              if (-not $cmd) {
                Write-Error "CODEX_B_REVIEW_AGENT_COMMAND is not configured."
                exit 2
              }
              Invoke-Expression $cmd
            }
            "codex_acceptance" {
              $cmd = if ($env:CODEX_A_ACCEPTANCE_AGENT_COMMAND) { $env:CODEX_A_ACCEPTANCE_AGENT_COMMAND } else { $env:ACCEPTANCE_AGENT_COMMAND }
              if (-not $cmd) {
                Write-Error "CODEX_A_ACCEPTANCE_AGENT_COMMAND is not configured."
                exit 2
              }
              Invoke-Expression $cmd
            }
            default {
              Write-Error "Unknown stage $env:STAGE"
              exit 2
            }
          }

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run stage gate
        id: stage-gate
        env:
          STAGE: ${{ steps.stage.outputs.stage }}
        run: |
          $ErrorActionPreference = "Continue"
          switch ($env:STAGE) {
            "codex_pm" { $gate = "pm" }
            "codex_architect" { $gate = "architecture" }
            "claude_lead_plan" { $gate = "team_plan" }
            "claude_developer" { $gate = "phase_dev" }
            "claude_tester" { $gate = "phase_test" }
            "claude_lead_review" { $gate = "claude_lead_review" }
            "codex_reviewer" { $gate = "codex_review" }
            "codex_acceptance" { $gate = "acceptance" }
            "bugfix" { $gate = "phase_test" }
            "postmortem" {
              Write-Host "Postmortem stage has no standard report gate."
              "gate_passed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
              exit 0
            }
            default { $gate = "team_plan" }
          }

          $deliveryStatus = 0
          if ($env:STAGE -eq "claude_developer" -or $env:STAGE -eq "bugfix") {
            python scripts/agent_pipeline.py validate-stage-delivery --stage $env:STAGE
            $deliveryStatus = $LASTEXITCODE
          }

          python scripts/agent_pipeline.py check-gates --through-stage $gate
          $gateStatus = $LASTEXITCODE
          $gateFile = ".agent/gates/${gate}_gate.json"
          $gatePassed = $false
          if (Test-Path $gateFile) {
            $gateData = Get-Content $gateFile -Raw -Encoding utf8 | ConvertFrom-Json
            $gatePassed = $gateData.passed -eq $true -and $deliveryStatus -eq 0
          }

          python scripts/agent_pipeline.py sync-state-from-gates
          $syncStatus = $LASTEXITCODE

          $retryAllowed = $true
          if (-not $gatePassed -and $gate -eq "phase_test") {
            $failureJson = python scripts/agent_pipeline.py register-stage-failure --stage phase_test | Out-String
            if ($LASTEXITCODE -ne 0) {
              $retryAllowed = $false
            } else {
              $failureResult = $failureJson | ConvertFrom-Json
              $retryAllowed = $failureResult.retry_allowed -eq $true
            }
          }

          $nextStage = ""
          if ($gatePassed -and $env:STAGE -eq "claude_tester") {
            $phaseJson = python scripts/agent_pipeline.py advance-phase | Out-String
            $phaseStatus = $LASTEXITCODE
            if ($phaseStatus -ne 0) {
              $gatePassed = $false
            } else {
              $phaseResult = $phaseJson | ConvertFrom-Json
              $nextStage = $phaseResult.next_stage
            }
          }

          "gate_name=$gate" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "gate_passed=$($gatePassed.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "next_stage=$nextStage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "gate_status=$gateStatus" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sync_status=$syncStatus" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "retry_allowed=$($retryAllowed.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0

      - name: Commit stage artifacts
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "agent-pipeline-bot"
          git config user.email "agent-pipeline-bot@users.noreply.github.com"

          $changedTestReports = git status --porcelain=v1 --untracked-files=all -- docs/test_reports
          foreach ($line in $changedTestReports) {
            if ($line.Length -lt 4) { continue }
            $reportPath = $line.Substring(3).Trim().Trim('"')
            if (-not (Test-Path $reportPath)) { continue }
            $reportText = Get-Content $reportPath -Raw -Encoding utf8
            $matches = [regex]::Matches(
              $reportText,
              'feedback/bugs/open/BUG_[A-Za-z0-9_.-]+\.(?:md|json)'
            )
            foreach ($match in $matches) {
              $evidencePath = $match.Value.Replace('\', '/')
              if (Test-Path $evidencePath) {
                git add -f -- $evidencePath
                if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
              }
            }
          }

          foreach ($path in @(
            ".agent",
            ".github",
            "docs",
            "scripts",
            "tests",
            "src",
            "AGENTS.md",
            "pyproject.toml",
            ".gitignore"
          )) {
            if (Test-Path $path) {
              git add $path
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No stage artifacts to commit."
          } else {
            git commit -m "chore(agent): run ${{ steps.stage.outputs.stage }} stage"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git push
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Dispatch explicit PR validation
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ github.event.pull_request.number || inputs.pr_number }}"
          $branch = gh pr view $pr --json headRefName --jq ".headRefName"
          if ($LASTEXITCODE -ne 0 -or -not $branch) { exit 2 }
          gh workflow run agent-pr-validation.yml --ref $branch -f pr_number=$pr
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Advance PR label for next automated stage
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          STAGE: ${{ steps.stage.outputs.stage }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ github.event.pull_request.number || inputs.pr_number }}"
          $branch = gh pr view $pr --json headRefName --jq ".headRefName"
          if ($LASTEXITCODE -ne 0 -or -not $branch) { exit 2 }

          function Remove-CurrentLabel([string]$label) {
            gh pr edit $pr --remove-label $label
            if ($LASTEXITCODE -ne 0) { Write-Host "Label '$label' was not removed; continuing." }
          }

          function Add-NextLabel([string]$label) {
            gh pr edit $pr --add-label $label
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          $nextStage = ""
          $gatePassed = "${{ steps.stage-gate.outputs.gate_passed }}" -eq "true"
          $gateName = "${{ steps.stage-gate.outputs.gate_name }}"

          function Remove-StageLabels {
            foreach ($label in @(
              "stage:team-dev-pending",
              "stage:team-test-pending",
              "stage:claude-lead-review-pending",
              "stage:codex-review-pending",
              "stage:pm-acceptance-pending",
              "stage:merge-ready"
            )) {
              Remove-CurrentLabel $label
            }
          }

          if (-not $gatePassed) {
            $gateFile = ".agent/gates/${gateName}_gate.json"
            $routeBack = ""
            if (Test-Path $gateFile) {
              $failedGate = Get-Content $gateFile -Raw -Encoding utf8 | ConvertFrom-Json
              $routeBack = $failedGate.route_back_to
              Write-Host "Stage gate failed: gate=$gateName decision=$($failedGate.decision) route_back_to=$routeBack"
            }

            Remove-StageLabels
            $retryAllowed = "${{ steps.stage-gate.outputs.retry_allowed }}" -eq "true"
            if (-not $retryAllowed) {
              $routeBack = ""
              Write-Host "Automatic retry budget exhausted; routing to manual approval."
            }
            switch ($routeBack) {
              "claude_developer" {
                Add-NextLabel "stage:team-dev-pending"
                if ($env:STAGE -ne "claude_developer" -and $env:STAGE -ne "bugfix") {
                  $nextStage = "claude_developer"
                }
              }
              "claude_lead_review" {
                Add-NextLabel "stage:claude-lead-review-pending"
                $nextStage = "claude_lead_review"
              }
              default {
                Add-NextLabel "stage:manual-approval-required"
              }
            }

            if ($nextStage) {
              gh workflow run agent-stage-runner.yml --ref $branch -f stage=$nextStage -f pr_number=$pr
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
            Write-Error "Stage '$env:STAGE' failed gate '$gateName'; evidence was committed and routing stopped or returned safely."
            exit 2
          }

          # Sync state from gates before auto-advance decisions so
          # downstream labels are based on current gate truth.
          python scripts/agent_pipeline.py sync-state-from-gates
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python scripts/agent_pipeline.py check-state-gate-consistency
          if ($LASTEXITCODE -ne 0) {
            Write-Host "WARNING: state/gate consistency check failed before auto-advance. Failing safely."
            Add-NextLabel "stage:manual-approval-required"
            exit 2
          }

          switch ($env:STAGE) {
            "codex_pm" {
              Remove-CurrentLabel "stage:pm-pending"
              Add-NextLabel "stage:arch-pending"
              $nextStage = "codex_architect"
            }
            "codex_architect" {
              Remove-CurrentLabel "stage:arch-pending"
              Add-NextLabel "stage:team-plan-pending"
              $nextStage = "claude_lead_plan"
            }
            "claude_lead_plan" {
              Remove-CurrentLabel "stage:team-plan-pending"
              Add-NextLabel "stage:team-dev-pending"
              $nextStage = "claude_developer"
            }
            "claude_developer" {
              Remove-CurrentLabel "stage:team-dev-pending"
              Add-NextLabel "stage:team-test-pending"
              $nextStage = "claude_tester"
            }
            "claude_tester" {
              Remove-CurrentLabel "stage:team-test-pending"
              $phaseNextStage = "${{ steps.stage-gate.outputs.next_stage }}"
              if ($phaseNextStage -eq "claude_lead_review") {
                Add-NextLabel "stage:claude-lead-review-pending"
                $nextStage = "claude_lead_review"
              } elseif ($phaseNextStage -eq "claude_developer") {
                Add-NextLabel "stage:team-dev-pending"
                $nextStage = "claude_developer"
              } else {
                Write-Host "ERROR: passing phase_test did not produce a deterministic next stage."
                Add-NextLabel "stage:manual-approval-required"
                exit 2
              }
            }
            "claude_lead_review" {
              Remove-CurrentLabel "stage:claude-lead-review-pending"
              Add-NextLabel "stage:codex-review-pending"
              $nextStage = "codex_reviewer"
            }
            "codex_reviewer" {
              Remove-CurrentLabel "stage:codex-review-pending"
              Add-NextLabel "stage:pm-acceptance-pending"
              $nextStage = "codex_acceptance"
            }
            "codex_acceptance" {
              Remove-CurrentLabel "stage:pm-acceptance-pending"
              Add-NextLabel "stage:merge-ready"
              gh workflow run agent-main-merge-gate.yml --ref $branch -f pr_number=$pr
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }

          if ($nextStage) {
            gh workflow run agent-stage-runner.yml --ref $branch -f stage=$nextStage -f pr_number=$pr
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Generate Pipeline Diagnostic Report
        if: always()
        run: |
          $ErrorActionPreference = "Continue"
          New-Item -ItemType Directory -Force -Path .agent/reports | Out-Null
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)

          python scripts/agent_pipeline_regression.py --strict --json --output .agent/reports/pipeline_report.json
          $regressionStatus = $LASTEXITCODE

          if (-not (Test-Path .agent/reports/pipeline_report.json) -or (Get-Item .agent/reports/pipeline_report.json).Length -eq 0) {
            $fallback = @{
              status = "fail"
              summary = @{ critical_count = 1; warning_count = 0; info_count = 0 }
              checks = @(@{
                name = "diagnostic_fallback"
                severity = "critical"
                passed = $false
                message = "Pipeline regression report not generated. This is a diagnostic fallback; check the Actions log."
              })
              artifacts = @{ diagnostic_fallback = $true }
            }
            $fallbackJson = $fallback | ConvertTo-Json -Depth 8
            $reportPath = Join-Path (Get-Location) ".agent/reports/pipeline_report.json"
            [System.IO.File]::WriteAllText($reportPath, $fallbackJson, $utf8NoBom)
          }

          python scripts/agent_pipeline_report_viewer.py --input .agent/reports/pipeline_report.json --output .agent/reports/pipeline_dashboard.html
          $viewerStatus = $LASTEXITCODE
          if ($viewerStatus -ne 0 -or -not (Test-Path .agent/reports/pipeline_dashboard.html)) {
            $fallbackHtml = @"
          <!doctype html>
          <html lang="en"><meta charset="utf-8"><title>Pipeline Diagnostic Report</title>
          <body><h1>Pipeline Diagnostic Report</h1><p>Dashboard generation failed. This is a diagnostic fallback; check the JSON artifact and Actions log.</p></body></html>
          "@
            $dashboardPath = Join-Path (Get-Location) ".agent/reports/pipeline_dashboard.html"
            [System.IO.File]::WriteAllText($dashboardPath, $fallbackHtml, $utf8NoBom)
          }

          Write-Host "Regression exit code: $regressionStatus; Dashboard generation exit code: $viewerStatus"
          exit 0

      - name: 上传 Pipeline Dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-dashboard-stage-${{ steps.stage.outputs.stage || 'unknown' }}-pr-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}-${{ github.run_id }}
          path: |
            .agent/reports/pipeline_report.json
            .agent/reports/pipeline_dashboard.html
            .agent/gates/*.json
          if-no-files-found: error
          retention-days: 14

  runtime-preflight:
    if: github.event_name == 'workflow_dispatch' && inputs.stage == 'runtime_preflight'
    runs-on: [self-hosted, Windows, X64, local-windows-codex]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.ref_name }}

      - name: Probe OpenCode GLM 5.2 Team Lead
        if: inputs.runtime_role == 'all' || inputs.runtime_role == 'lead'
        run: .\scripts\run-team-stage.ps1 -Stage claude_lead_plan -PreflightOnly

      - name: Probe OpenCode DeepSeek V4 Pro max Test Engineer
        if: inputs.runtime_role == 'all' || inputs.runtime_role == 'tester'
        run: .\scripts\run-team-stage.ps1 -Stage claude_tester -PreflightOnly

      - name: Probe OpenCode DeepSeek V4 Flash max Developer
        if: inputs.runtime_role == 'all' || inputs.runtime_role == 'developer'
        run: .\scripts\run-team-stage.ps1 -Stage claude_developer -PreflightOnly

      - name: Upload Runtime Preflight diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-preflight-${{ inputs.runtime_role }}-${{ github.run_id }}
          path: .agent/tmp/runtime-preflight-*
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
