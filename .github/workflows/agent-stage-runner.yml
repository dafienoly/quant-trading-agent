name: Agent Stage Runner

run-name: >-
  ${{ inputs.stage || github.event.label.name || 'unknown-stage' }}
  / PR #${{ inputs.pr_number || github.event.pull_request.number || '' }}

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      stage:
        description: Stage to run
        required: true
        type: choice
        options:
          - claude_lead_plan
          - claude_developer
          - claude_tester
          - claude_lead_review
          - bugfix
          - codex_reviewer
          - codex_pm
          - codex_architect
          - codex_acceptance
          - postmortem
      pr_number:
        description: Pull request number for label advancement when dispatched by another workflow
        required: false
      dry_run:
        description: Generate handoff only
        required: false
        default: "false"

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-stage-pr-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}-${{ github.event.label.name || inputs.stage }}
  cancel-in-progress: true

defaults:
  run:
    shell: powershell

jobs:
  run-stage:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        startsWith(github.event.pull_request.head.ref, 'epic/') &&
        contains(fromJson('["stage:codex-pm-pending","stage:codex-architect-pending","stage:team-plan-pending","stage:team-dev-pending","stage:team-test-pending","stage:claude-lead-review-pending","stage:fix-pending","stage:codex-review-pending","stage:pm-acceptance-pending","stage:postmortem-pending"]'), github.event.label.name)
      )
    runs-on: [self-hosted, Windows, X64, local-windows-codex]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight pipeline dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Determine stage
        id: stage
        run: |
          $ErrorActionPreference = "Stop"
          $stage = "${{ inputs.stage }}"
          $label = "${{ github.event.label.name || '' }}"
          if (-not $stage) {
            switch ($label) {
              "stage:codex-pm-pending" { $stage = "codex_pm" }
              "stage:codex-architect-pending" { $stage = "codex_architect" }
              "stage:team-plan-pending" { $stage = "claude_lead_plan" }
              "stage:team-dev-pending" { $stage = "claude_developer" }
              "stage:team-test-pending" { $stage = "claude_tester" }
              "stage:claude-lead-review-pending" { $stage = "claude_lead_review" }
              "stage:fix-pending" { $stage = "bugfix" }
              "stage:codex-review-pending" { $stage = "codex_reviewer" }
              "stage:pm-acceptance-pending" { $stage = "codex_acceptance" }
              "stage:postmortem-pending" { $stage = "postmortem" }
              default {
                Write-Error "Cannot infer stage from label '$label'"
                exit 2
              }
            }
          }

          python scripts/agent_pipeline.py write-handoff --stage $stage
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "stage=$stage" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run configured Agent command
        env:
          STAGE: ${{ steps.stage.outputs.stage }}
          AGENT_REAL_CLAUDE_LEAD_PLAN: ${{ vars.AGENT_REAL_CLAUDE_LEAD_PLAN || '' }}
          AGENT_REAL_CLAUDE_LEAD_PLAN_STRICT: ${{ vars.AGENT_REAL_CLAUDE_LEAD_PLAN_STRICT || '' }}
          AGENT_REAL_CLAUDE_DEVELOPER: ${{ vars.AGENT_REAL_CLAUDE_DEVELOPER || '' }}
          AGENT_REAL_CLAUDE_DEVELOPER_STRICT: ${{ vars.AGENT_REAL_CLAUDE_DEVELOPER_STRICT || '' }}
          AGENT_REAL_CLAUDE_TESTER: ${{ vars.AGENT_REAL_CLAUDE_TESTER || '' }}
          AGENT_REAL_CLAUDE_TESTER_STRICT: ${{ vars.AGENT_REAL_CLAUDE_TESTER_STRICT || '' }}
          AGENT_REAL_CLAUDE_LEAD_REVIEW: ${{ vars.AGENT_REAL_CLAUDE_LEAD_REVIEW || '' }}
          AGENT_REAL_CLAUDE_LEAD_REVIEW_STRICT: ${{ vars.AGENT_REAL_CLAUDE_LEAD_REVIEW_STRICT || '' }}
          AGENT_REAL_CODEX_REVIEWER: ${{ vars.AGENT_REAL_CODEX_REVIEWER || '' }}
          AGENT_REAL_CODEX_REVIEWER_STRICT: ${{ vars.AGENT_REAL_CODEX_REVIEWER_STRICT || '' }}
          AGENT_REAL_CODEX_PM: ${{ vars.AGENT_REAL_CODEX_PM || '' }}
          AGENT_REAL_CODEX_PM_STRICT: ${{ vars.AGENT_REAL_CODEX_PM_STRICT || '' }}
          AGENT_REAL_CODEX_ARCHITECT: ${{ vars.AGENT_REAL_CODEX_ARCHITECT || '' }}
          AGENT_REAL_CODEX_ARCHITECT_STRICT: ${{ vars.AGENT_REAL_CODEX_ARCHITECT_STRICT || '' }}
          AGENT_REAL_CODEX_ACCEPTANCE: ${{ vars.AGENT_REAL_CODEX_ACCEPTANCE || '' }}
          AGENT_REAL_CODEX_ACCEPTANCE_STRICT: ${{ vars.AGENT_REAL_CODEX_ACCEPTANCE_STRICT || '' }}
          CODEX_A_PM_AGENT_COMMAND: ${{ secrets.CODEX_A_PM_AGENT_COMMAND || vars.CODEX_A_PM_AGENT_COMMAND }}
          CODEX_B_ARCHITECT_AGENT_COMMAND: ${{ secrets.CODEX_B_ARCHITECT_AGENT_COMMAND || vars.CODEX_B_ARCHITECT_AGENT_COMMAND }}
          CLAUDE_LEAD_AGENT_COMMAND: ${{ secrets.CLAUDE_LEAD_AGENT_COMMAND || vars.CLAUDE_LEAD_AGENT_COMMAND }}
          CLAUDE_DEVELOPER_AGENT_COMMAND: ${{ secrets.CLAUDE_DEVELOPER_AGENT_COMMAND || vars.CLAUDE_DEVELOPER_AGENT_COMMAND }}
          CLAUDE_TESTER_AGENT_COMMAND: ${{ secrets.CLAUDE_TESTER_AGENT_COMMAND || vars.CLAUDE_TESTER_AGENT_COMMAND }}
          BUGFIX_AGENT_COMMAND: ${{ secrets.BUGFIX_AGENT_COMMAND || vars.BUGFIX_AGENT_COMMAND }}
          CODEX_B_REVIEW_AGENT_COMMAND: ${{ secrets.CODEX_B_REVIEW_AGENT_COMMAND || vars.CODEX_B_REVIEW_AGENT_COMMAND }}
          CODEX_A_ACCEPTANCE_AGENT_COMMAND: ${{ secrets.CODEX_A_ACCEPTANCE_AGENT_COMMAND || vars.CODEX_A_ACCEPTANCE_AGENT_COMMAND }}
          DEVELOPER_AGENT_COMMAND: ${{ secrets.DEVELOPER_AGENT_COMMAND || vars.DEVELOPER_AGENT_COMMAND }}
          TEST_AGENT_COMMAND: ${{ secrets.TEST_AGENT_COMMAND || vars.TEST_AGENT_COMMAND }}
          REVIEW_AGENT_COMMAND: ${{ secrets.REVIEW_AGENT_COMMAND || vars.REVIEW_AGENT_COMMAND }}
          ACCEPTANCE_AGENT_COMMAND: ${{ secrets.ACCEPTANCE_AGENT_COMMAND || vars.ACCEPTANCE_AGENT_COMMAND }}
          DRY_RUN: ${{ inputs.dry_run || contains(github.event.pull_request.labels.*.name, 'agent:dry-run') }}
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:DRY_RUN -eq "true" -or $env:DRY_RUN -eq "1") {
            Write-Host "Dry run: generated .agent/handoff/$env:STAGE.md"
            exit 0
          }

          $cmd = ""
          switch ($env:STAGE) {
            "codex_pm" { $cmd = if ($env:CODEX_A_PM_AGENT_COMMAND) { $env:CODEX_A_PM_AGENT_COMMAND } else { $env:CLAUDE_LEAD_AGENT_COMMAND } }
            "codex_architect" { $cmd = if ($env:CODEX_B_ARCHITECT_AGENT_COMMAND) { $env:CODEX_B_ARCHITECT_AGENT_COMMAND } else { $env:CLAUDE_LEAD_AGENT_COMMAND } }
            "claude_lead_plan" { $cmd = $env:CLAUDE_LEAD_AGENT_COMMAND }
            "claude_developer" { $cmd = if ($env:CLAUDE_DEVELOPER_AGENT_COMMAND) { $env:CLAUDE_DEVELOPER_AGENT_COMMAND } else { $env:DEVELOPER_AGENT_COMMAND } }
            "claude_tester" { $cmd = if ($env:CLAUDE_TESTER_AGENT_COMMAND) { $env:CLAUDE_TESTER_AGENT_COMMAND } else { $env:TEST_AGENT_COMMAND } }
            "claude_lead_review" { $cmd = $env:CLAUDE_LEAD_AGENT_COMMAND }
            "bugfix" { $cmd = $env:BUGFIX_AGENT_COMMAND }
            "codex_reviewer" { $cmd = if ($env:CODEX_B_REVIEW_AGENT_COMMAND) { $env:CODEX_B_REVIEW_AGENT_COMMAND } else { $env:REVIEW_AGENT_COMMAND } }
            "codex_acceptance" { $cmd = if ($env:CODEX_A_ACCEPTANCE_AGENT_COMMAND) { $env:CODEX_A_ACCEPTANCE_AGENT_COMMAND } else { $env:ACCEPTANCE_AGENT_COMMAND } }
            "postmortem" { $cmd = $env:CLAUDE_LEAD_AGENT_COMMAND }
            default {
              Write-Error "Unknown stage $env:STAGE"
              exit 2
            }
          }

          if (-not $cmd) {
            Write-Error "Agent command for stage '$env:STAGE' is not configured."
            exit 2
          }

          Invoke-Expression $cmd
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run stage gate
        env:
          STAGE: ${{ steps.stage.outputs.stage }}
        run: |
          $ErrorActionPreference = "Stop"
          switch ($env:STAGE) {
            "codex_pm" { $gate = "pm" }
            "codex_architect" { $gate = "architecture" }
            "claude_lead_plan" { $gate = "team_plan" }
            "claude_developer" { $gate = "phase_dev" }
            "claude_tester" { $gate = "phase_test" }
            "claude_lead_review" { $gate = "claude_lead_review" }
            "codex_reviewer" { $gate = "codex_review" }
            "codex_acceptance" { $gate = "acceptance" }
            "bugfix" { $gate = "phase_test" }
            "postmortem" {
              Write-Host "Postmortem stage has no standard report gate."
              exit 0
            }
            default { $gate = "team_plan" }
          }
          python scripts/agent_pipeline.py check-gates --through-stage $gate
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python scripts/agent_pipeline.py sync-state-from-gates
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit stage artifacts
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "agent-pipeline-bot"
          git config user.email "agent-pipeline-bot@users.noreply.github.com"
          foreach ($path in @(".agent", "docs", "tests", "src")) {
            if (Test-Path $path) {
              git add $path
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No stage artifacts to commit."
          } else {
            git commit -m "chore(agent): run ${{ steps.stage.outputs.stage }} stage"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git push
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Advance PR label for next automated stage
        if: github.event_name == 'pull_request' || inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          STAGE: ${{ steps.stage.outputs.stage }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ github.event.pull_request.number || inputs.pr_number }}"
          $branch = gh pr view $pr --json headRefName --jq ".headRefName"
          if ($LASTEXITCODE -ne 0 -or -not $branch) { exit 2 }

          function Remove-CurrentLabel([string]$label) {
            gh pr edit $pr --remove-label $label
            if ($LASTEXITCODE -ne 0) { Write-Host "Label '$label' was not removed; continuing." }
          }

          function Add-NextLabel([string]$label) {
            gh pr edit $pr --add-label $label
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          $nextStage = ""

          # Sync state from gates before auto-advance decisions so
          # downstream labels are based on current gate truth.
          python scripts/agent_pipeline.py sync-state-from-gates
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python scripts/agent_pipeline.py check-state-gate-consistency
          if ($LASTEXITCODE -ne 0) {
            Write-Host "WARNING: state/gate consistency check failed before auto-advance. Failing safely."
            Add-NextLabel "stage:manual-approval-required"
            exit 2
          }

          switch ($env:STAGE) {
            "codex_pm" {
              Remove-CurrentLabel "stage:codex-pm-pending"
              Add-NextLabel "stage:codex-architect-pending"
              $nextStage = "codex_architect"
            }
            "codex_architect" {
              Remove-CurrentLabel "stage:codex-architect-pending"
              Add-NextLabel "stage:team-plan-pending"
              $nextStage = "claude_lead_plan"
            }
            "claude_lead_plan" {
              Remove-CurrentLabel "stage:team-plan-pending"
              Add-NextLabel "stage:team-dev-pending"
              $nextStage = "claude_developer"
            }
            "claude_developer" {
              Remove-CurrentLabel "stage:team-dev-pending"
              Add-NextLabel "stage:team-test-pending"
              $nextStage = "claude_tester"
            }
            "claude_tester" {
              Remove-CurrentLabel "stage:team-test-pending"
              $allDone = python scripts/agent_pipeline.py print-state --key team_pipeline.all_phases_tested
              if ($LASTEXITCODE -ne 0) { $allDone = "false" }
              if ($allDone -eq "true" -or $allDone -eq "True") {
                Add-NextLabel "stage:claude-lead-review-pending"
                $nextStage = "claude_lead_review"
              } else {
                # Anti-infinite-loop guard: only relevant during phase iteration
                # (claude_tester / claude_developer).  After claude_lead_review,
                # codex_reviewer, or codex_acceptance the pipeline must not
                # dispatch back into the dev/test loop — even if the state
                # metadata is still stale.
                if ($env:STAGE -ne "claude_tester" -and $env:STAGE -ne "claude_developer") {
                  Write-Host "WARNING: phase-loop guard triggered outside phase-iteration stage ($env:STAGE). Failing safely."
                  Add-NextLabel "stage:manual-approval-required"
                  exit 2
                }
                $gateFile = ".agent/gates/phase_test_gate.json"
                if (Test-Path $gateFile) {
                  $gate = Get-Content $gateFile -Raw -Encoding utf8 | ConvertFrom-Json
                  if ($gate.passed -eq $true) {
                    Write-Host "ERROR: phase_test gate passed but team_pipeline.all_phases_tested is false. State update bug — not dispatching to prevent infinite loop."
                    Add-NextLabel "stage:manual-approval-required"
                    exit 2
                  }
                }
                Add-NextLabel "stage:team-dev-pending"
                $nextStage = "claude_developer"
              }
            }
            "claude_lead_review" {
              Remove-CurrentLabel "stage:claude-lead-review-pending"
              Add-NextLabel "stage:codex-review-pending"
              $nextStage = "codex_reviewer"
            }
            "codex_reviewer" {
              Remove-CurrentLabel "stage:codex-review-pending"
              Add-NextLabel "stage:pm-acceptance-pending"
              $nextStage = "codex_acceptance"
            }
            "codex_acceptance" {
              Remove-CurrentLabel "stage:pm-acceptance-pending"
              Add-NextLabel "stage:merge-ready"
              gh workflow run agent-main-merge-gate.yml --ref $branch -f pr_number=$pr
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }

          if ($nextStage) {
            gh workflow run agent-stage-runner.yml --ref $branch -f stage=$nextStage -f pr_number=$pr
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
