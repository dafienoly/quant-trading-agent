name: Agent Issue Bootstrap

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      title:
        description: Feature title when running manually
        required: true
      feature_id:
        description: Optional feature slug
        required: false
      risk_level:
        description: Risk level
        required: false
        default: docs-only
      dry_run:
        description: Generate state and handoff only
        required: false
        default: "false"

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: agent-bootstrap-issue-${{ github.event.issue.number || inputs.feature_id || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: powershell

jobs:
  bootstrap:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        (github.event.action == 'opened' || github.event.action == 'reopened') &&
        contains(github.event.issue.labels.*.name, 'agent:pipeline') &&
        contains(github.event.issue.labels.*.name, 'stage:pm-pending') &&
        !contains(github.event.issue.labels.*.name, 'agent:bootstrapped')
      )
    runs-on: [self-hosted, Windows, X64, local-windows-codex]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight pipeline dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Initialize pipeline state and handoff
        id: init
        env:
          ISSUE_TITLE: ${{ github.event.issue.title || inputs.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          ISSUE_URL: ${{ github.event.issue.html_url || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}
          FEATURE_ID: ${{ inputs.feature_id }}
          RISK_LEVEL: ${{ inputs.risk_level || '' }}
        run: |
          $ErrorActionPreference = "Stop"

          $riskLevel = $env:RISK_LEVEL
          if (-not $riskLevel) {
              $body = $env:ISSUE_BODY
              if ($body -match '(?m)^## Risk Level[ \t]*\r?\n[ \t]*([^\r\n]+)') {
                  $riskLevel = $matches[1].Trim()
              }
              if (-not $riskLevel) { $riskLevel = "unknown" }
          }

          $argsList = @("--title", $env:ISSUE_TITLE, "--risk-level", $riskLevel)
          if ($env:FEATURE_ID) {
            $argsList += @("--feature-id", $env:FEATURE_ID)
          }
          if ($env:ISSUE_NUMBER) {
            $argsList += @("--issue-number", $env:ISSUE_NUMBER)
          }
          if ($env:ISSUE_URL) {
            $argsList += @("--issue-url", $env:ISSUE_URL)
          }

          python scripts/agent_pipeline.py init-feature @argsList
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $epicBranch = python scripts/agent_pipeline.py print-state --key epic_branch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $featureId = python scripts/agent_pipeline.py print-state --key feature_id
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          "epic_branch=$epicBranch" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "feature_id=$featureId" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create or switch epic branch
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "agent-pipeline-bot"
          git config user.email "agent-pipeline-bot@users.noreply.github.com"
          $branch = "${{ steps.init.outputs.epic_branch }}"
          git switch -c $branch
          if ($LASTEXITCODE -ne 0) {
            git switch $branch
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Run Codex A PM command or generate handoff-only dry run
        env:
          AGENT_REAL_CODEX_PM: ${{ vars.AGENT_REAL_CODEX_PM || '' }}
          AGENT_REAL_CODEX_PM_STRICT: ${{ vars.AGENT_REAL_CODEX_PM_STRICT || '' }}
          CODEX_A_PM_AGENT_COMMAND: ${{ secrets.CODEX_A_PM_AGENT_COMMAND || vars.CODEX_A_PM_AGENT_COMMAND }}
          PM_ARCHITECT_AGENT_COMMAND: ${{ secrets.PM_ARCHITECT_AGENT_COMMAND || vars.PM_ARCHITECT_AGENT_COMMAND }}
          DRY_RUN: ${{ inputs.dry_run || contains(github.event.issue.labels.*.name, 'agent:dry-run') }}
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "AGENT_REAL_CODEX_PM=$env:AGENT_REAL_CODEX_PM AGENT_REAL_CODEX_PM_STRICT=$env:AGENT_REAL_CODEX_PM_STRICT"
          if ($env:DRY_RUN -eq "true" -or $env:DRY_RUN -eq "1") {
            Write-Host "Dry run: handoff generated at .agent/handoff/codex_pm.md"
          } elseif ($env:CODEX_A_PM_AGENT_COMMAND) {
            Invoke-Expression $env:CODEX_A_PM_AGENT_COMMAND
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } elseif ($env:PM_ARCHITECT_AGENT_COMMAND) {
            Invoke-Expression $env:PM_ARCHITECT_AGENT_COMMAND
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Error "CODEX_A_PM_AGENT_COMMAND is not configured. Add agent:dry-run for handoff-only mode."
            exit 2
          }

      - name: Prepare Codex B architect handoff
        run: |
          python scripts/agent_pipeline.py write-handoff --stage codex_architect
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Codex B Architect command or generate handoff-only dry run
        env:
          AGENT_REAL_CODEX_ARCHITECT: ${{ vars.AGENT_REAL_CODEX_ARCHITECT || '' }}
          AGENT_REAL_CODEX_ARCHITECT_STRICT: ${{ vars.AGENT_REAL_CODEX_ARCHITECT_STRICT || '' }}
          CODEX_B_ARCHITECT_AGENT_COMMAND: ${{ secrets.CODEX_B_ARCHITECT_AGENT_COMMAND || vars.CODEX_B_ARCHITECT_AGENT_COMMAND }}
          DRY_RUN: ${{ inputs.dry_run || contains(github.event.issue.labels.*.name, 'agent:dry-run') }}
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "AGENT_REAL_CODEX_ARCHITECT=$env:AGENT_REAL_CODEX_ARCHITECT AGENT_REAL_CODEX_ARCHITECT_STRICT=$env:AGENT_REAL_CODEX_ARCHITECT_STRICT"
          if ($env:DRY_RUN -eq "true" -or $env:DRY_RUN -eq "1") {
            Write-Host "Dry run: handoff generated at .agent/handoff/codex_architect.md"
          } elseif ($env:CODEX_B_ARCHITECT_AGENT_COMMAND) {
            Invoke-Expression $env:CODEX_B_ARCHITECT_AGENT_COMMAND
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Error "CODEX_B_ARCHITECT_AGENT_COMMAND is not configured. Add agent:dry-run for handoff-only mode."
            exit 2
          }

      - name: Prepare Claude Code A team-plan handoff
        run: |
          python scripts/agent_pipeline.py write-handoff --stage claude_lead_plan
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run Claude Code A team-plan command or generate handoff-only dry run
        env:
          STAGE: claude_lead_plan
          CLAUDE_LEAD_AGENT_COMMAND: ${{ secrets.CLAUDE_LEAD_AGENT_COMMAND || vars.CLAUDE_LEAD_AGENT_COMMAND }}
          AGENT_REAL_CLAUDE_LEAD_PLAN: ${{ vars.AGENT_REAL_CLAUDE_LEAD_PLAN || '' }}
          AGENT_REAL_CLAUDE_LEAD_PLAN_STRICT: ${{ vars.AGENT_REAL_CLAUDE_LEAD_PLAN_STRICT || '' }}
          DRY_RUN: ${{ inputs.dry_run || contains(github.event.issue.labels.*.name, 'agent:dry-run') }}
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "AGENT_REAL_CLAUDE_LEAD_PLAN=$env:AGENT_REAL_CLAUDE_LEAD_PLAN AGENT_REAL_CLAUDE_LEAD_PLAN_STRICT=$env:AGENT_REAL_CLAUDE_LEAD_PLAN_STRICT"
          if ($env:DRY_RUN -eq "true" -or $env:DRY_RUN -eq "1") {
            Write-Host "Dry run: handoff generated at .agent/handoff/claude_lead_plan.md"
          } elseif ($env:CLAUDE_LEAD_AGENT_COMMAND) {
            Invoke-Expression $env:CLAUDE_LEAD_AGENT_COMMAND
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Error "CLAUDE_LEAD_AGENT_COMMAND is not configured. Add agent:dry-run for handoff-only mode."
            exit 2
          }

      - name: Commit pipeline bootstrap artifacts
        run: |
          $ErrorActionPreference = "Stop"
          foreach ($path in @(".agent", "docs/requirements", "docs/design", "docs/dev_plans")) {
            if (Test-Path $path) {
              git add $path
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          }
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No bootstrap artifacts to commit."
          } else {
            git commit -m "chore(agent): bootstrap ${{ steps.init.outputs.feature_id }} pipeline"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git push -u origin "${{ steps.init.outputs.epic_branch }}"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $branch = "${{ steps.init.outputs.epic_branch }}"
          $title = "agent: ${{ steps.init.outputs.feature_id }}"
          $body = "Issue-driven Agent pipeline branch. See .agent/current_task.yaml and .agent/handoff/."
          gh pr view $branch --json number
          if ($LASTEXITCODE -ne 0) {
            gh pr create --base main --head $branch --title $title --body $body
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Move issue to development stage
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $issue = "${{ github.event.issue.number }}"
          gh label create "agent:bootstrapped" --color "0E8A16" --description "Pipeline bootstrap has already created the epic branch and PR."
          if ($LASTEXITCODE -ne 0) { Write-Host "Label agent:bootstrapped already exists or could not be created; continuing." }

          gh issue edit $issue --add-label "agent:bootstrapped"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          gh issue edit $issue --remove-label "stage:pm-pending"
          if ($LASTEXITCODE -ne 0) { Write-Host "stage:pm-pending was not removed; continuing." }

          $branch = "${{ steps.init.outputs.epic_branch }}"
          $pr = gh pr view $branch --json number --jq ".number"
          if ($LASTEXITCODE -ne 0 -or -not $pr) {
            Write-Error "Could not find pipeline PR for branch '$branch'."
            exit 2
          }

          if ("${{ inputs.dry_run || contains(github.event.issue.labels.*.name, 'agent:dry-run') }}" -eq "true") {
            gh pr edit $pr --add-label "stage:team-plan-pending"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh workflow run agent-stage-runner.yml --ref $branch -f stage=claude_lead_plan -f pr_number=$pr
          } else {
            gh pr edit $pr --add-label "stage:team-dev-pending"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh workflow run agent-stage-runner.yml --ref $branch -f stage=claude_developer -f pr_number=$pr
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
