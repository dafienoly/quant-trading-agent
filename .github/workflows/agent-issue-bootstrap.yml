name: Agent Issue Bootstrap

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      title:
        description: Feature title when running manually
        required: true
      feature_id:
        description: Optional feature slug
        required: false
      risk_level:
        description: Risk level
        required: false
        default: docs-only
      dry_run:
        description: Generate state and handoff only
        required: false
        default: "false"

permissions:
  contents: write
  issues: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  bootstrap:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.label.name == 'agent:pipeline')
    runs-on: [self-hosted, Windows, X64, local-windows-codex]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight pipeline dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Initialize pipeline state and handoff
        id: init
        env:
          ISSUE_TITLE: ${{ github.event.issue.title || inputs.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          ISSUE_URL: ${{ github.event.issue.html_url || '' }}
          FEATURE_ID: ${{ inputs.feature_id }}
          RISK_LEVEL: ${{ inputs.risk_level || 'unknown' }}
        run: |
          set -euo pipefail
          args=(--title "$ISSUE_TITLE" --risk-level "$RISK_LEVEL")
          if [[ -n "${FEATURE_ID:-}" ]]; then args+=(--feature-id "$FEATURE_ID"); fi
          if [[ -n "${ISSUE_NUMBER:-}" ]]; then args+=(--issue-number "$ISSUE_NUMBER"); fi
          if [[ -n "${ISSUE_URL:-}" ]]; then args+=(--issue-url "$ISSUE_URL"); fi
          python scripts/agent_pipeline.py init-feature "${args[@]}"
          echo "epic_branch=$(python scripts/agent_pipeline.py print-state --key epic_branch)" >> "$GITHUB_OUTPUT"
          echo "feature_id=$(python scripts/agent_pipeline.py print-state --key feature_id)" >> "$GITHUB_OUTPUT"

      - name: Create or switch epic branch
        run: |
          set -euo pipefail
          git config user.name "agent-pipeline-bot"
          git config user.email "agent-pipeline-bot@users.noreply.github.com"
          branch="${{ steps.init.outputs.epic_branch }}"
          git switch -c "$branch" || git switch "$branch"

      - name: Run Codex A PM command or generate handoff-only dry run
        env:
          CODEX_A_PM_AGENT_COMMAND: ${{ secrets.CODEX_A_PM_AGENT_COMMAND || vars.CODEX_A_PM_AGENT_COMMAND }}
          PM_ARCHITECT_AGENT_COMMAND: ${{ secrets.PM_ARCHITECT_AGENT_COMMAND || vars.PM_ARCHITECT_AGENT_COMMAND }}
          DRY_RUN: ${{ inputs.dry_run || contains(github.event.issue.labels.*.name, 'agent:dry-run') }}
        run: |
          set -euo pipefail
          if [[ "${DRY_RUN}" == "true" || "${DRY_RUN}" == "1" ]]; then
            echo "Dry run: handoff generated at .agent/handoff/codex_pm.md"
          elif [[ -n "${CODEX_A_PM_AGENT_COMMAND:-}" ]]; then
            bash -lc "$CODEX_A_PM_AGENT_COMMAND"
          elif [[ -n "${PM_ARCHITECT_AGENT_COMMAND:-}" ]]; then
            bash -lc "$PM_ARCHITECT_AGENT_COMMAND"
          else
            echo "::error::CODEX_A_PM_AGENT_COMMAND is not configured. Add agent:dry-run for handoff-only mode."
            exit 2
          fi

      - name: Prepare Codex B architect handoff
        run: python scripts/agent_pipeline.py write-handoff --stage codex_architect

      - name: Run Codex B Architect command or generate handoff-only dry run
        env:
          CODEX_B_ARCHITECT_AGENT_COMMAND: ${{ secrets.CODEX_B_ARCHITECT_AGENT_COMMAND || vars.CODEX_B_ARCHITECT_AGENT_COMMAND }}
          DRY_RUN: ${{ inputs.dry_run || contains(github.event.issue.labels.*.name, 'agent:dry-run') }}
        run: |
          set -euo pipefail
          if [[ "${DRY_RUN}" == "true" || "${DRY_RUN}" == "1" ]]; then
            echo "Dry run: handoff generated at .agent/handoff/codex_architect.md"
          elif [[ -n "${CODEX_B_ARCHITECT_AGENT_COMMAND:-}" ]]; then
            bash -lc "$CODEX_B_ARCHITECT_AGENT_COMMAND"
          else
            echo "::error::CODEX_B_ARCHITECT_AGENT_COMMAND is not configured. Add agent:dry-run for handoff-only mode."
            exit 2
          fi

      - name: Prepare Claude Code A team-plan handoff
        run: python scripts/agent_pipeline.py write-handoff --stage claude_lead_plan

      - name: Commit pipeline bootstrap artifacts
        run: |
          set -euo pipefail
          git add .agent docs/requirements docs/design docs/dev_plans || true
          if git diff --cached --quiet; then
            echo "No bootstrap artifacts to commit."
          else
            git commit -m "chore(agent): bootstrap ${{ steps.init.outputs.feature_id }} pipeline"
            git push -u origin "${{ steps.init.outputs.epic_branch }}"
          fi

      - name: Create or update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="${{ steps.init.outputs.epic_branch }}"
          title="agent: ${{ steps.init.outputs.feature_id }}"
          body="Issue-driven Agent pipeline branch. See .agent/current_task.yaml and .agent/handoff/."
          gh pr view "$branch" --json number >/dev/null 2>&1 || \
            gh pr create --base main --head "$branch" --title "$title" --body "$body"

      - name: Move issue to development stage
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh issue edit "${{ github.event.issue.number }}" \
            --remove-label "stage:pm-pending" \
            --add-label "stage:team-plan-pending"
