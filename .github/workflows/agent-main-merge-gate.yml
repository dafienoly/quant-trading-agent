name: Agent Main Merge Gate

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      feature_id:
        description: Feature ID to check. Defaults to .agent/current_task.yaml.
        required: false
      pr_number:
        description: Pull request number when dispatched by Agent Stage Runner
        required: false
      force_manual_check_only:
        description: Do not merge, only emit gate result
        required: false
        default: "false"

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write
  checks: read

concurrency:
  group: agent-main-merge-gate-pr-${{ github.event.pull_request.number || inputs.feature_id || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: powershell

jobs:
  merge-gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        github.event.pull_request.base.ref == 'main' &&
        startsWith(github.event.pull_request.head.ref, 'epic/') &&
        (
          github.event.label.name == 'stage:merge-ready' ||
          github.event.label.name == 'agent:merge-gate'
        )
      )
    runs-on: [self-hosted, Windows, X64, local-windows-codex]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight pipeline dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Collect changed files
        run: |
          $ErrorActionPreference = "Stop"
          git fetch origin main --depth=1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          New-Item -ItemType Directory -Force -Path .agent | Out-Null
          git diff --name-only origin/main...HEAD | Out-File -FilePath .agent/changed_files.txt -Encoding utf8
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Get-Content .agent/changed_files.txt

      - name: Check required reports through acceptance
        env:
          FEATURE_ID: ${{ inputs.feature_id }}
        run: |
          $ErrorActionPreference = "Stop"
          $argsList = @("--through-stage", "acceptance")
          if ($env:FEATURE_ID) {
            $argsList += @("--feature-id", $env:FEATURE_ID)
          }
          python scripts/agent_pipeline.py check-gates @argsList
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Classify auto-main eligibility
        id: classify
        run: |
          python scripts/agent_pipeline.py classify-changes --changed-files-file .agent/changed_files.txt --fail-on-manual-approval
          $status = $LASTEXITCODE
          "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0

      - name: Commit gate artifacts
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "agent-pipeline-bot"
          git config user.email "agent-pipeline-bot@users.noreply.github.com"
          git add .agent/gates .agent/changed_files.txt
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No gate artifacts to commit."
          } else {
            git commit -m "chore(agent): record auto merge gate"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git push
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Require manual approval when gate fails
        if: steps.classify.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ github.event.pull_request.number || inputs.pr_number || '' }}"
          if ($pr) {
            gh pr edit $pr --add-label "stage:manual-approval-required"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh pr comment $pr --body "Auto-main merge blocked by policy. See .agent/gates/auto_merge_gate.json."
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          exit 1

      - name: Auto merge PR to main when allowed
        if: >-
          steps.classify.outputs.status == '0' &&
          inputs.force_manual_check_only != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ github.event.pull_request.number || inputs.pr_number || '' }}"
          if (-not $pr) {
            Write-Host "Workflow dispatch without PR context: gate passed, but no PR to merge."
            exit 0
          }
          gh pr merge $pr --merge --delete-branch --subject "merge(agent): auto-main safe pipeline"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
