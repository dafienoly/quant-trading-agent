name: Agent Main Merge Gate

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      feature_id:
        description: Feature ID to check. Defaults to .agent/current_task.yaml.
        required: false
      pr_number:
        description: Pull request number when dispatched by Agent Stage Runner
        required: false
      force_manual_check_only:
        description: Do not merge, only emit gate result
        required: false
        default: "false"

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write
  checks: read

concurrency:
  group: agent-main-merge-gate-pr-${{ github.event.pull_request.number || inputs.feature_id || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: powershell

jobs:
  merge-gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        github.event.pull_request.base.ref == 'main' &&
        startsWith(github.event.pull_request.head.ref, 'epic/') &&
        (
          github.event.label.name == 'stage:merge-ready' ||
          github.event.label.name == 'agent:merge-gate'
        )
      )
    runs-on: [self-hosted, Windows, X64, local-windows-codex]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight pipeline dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Collect changed files
        run: |
          $ErrorActionPreference = "Stop"

          # Fetch full main ref (checkout is fetch-depth:0 but --depth=1 below was
          # destroying the merge-base. Fetch the full ref instead.)
          git fetch origin +refs/heads/main:refs/remotes/origin/main --prune
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $mergeBase = git merge-base origin/main HEAD

          if (-not $mergeBase) {
            Write-Warning "No merge base found after normal fetch. Attempting to unshallow/deepen repository..."

            git fetch --unshallow 2>$null
            git fetch origin +refs/heads/main:refs/remotes/origin/main --prune
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            $mergeBase = git merge-base origin/main HEAD
          }

          if (-not $mergeBase) {
            Write-Error "Cannot find merge base between origin/main and HEAD."

            Write-Host "origin/main latest commits:"
            git log --oneline origin/main -10

            Write-Host "HEAD latest commits:"
            git log --oneline HEAD -10

            Write-Host "Available branches:"
            git branch -a

            exit 2
          }

          Write-Host "Merge base: $mergeBase"

          New-Item -ItemType Directory -Force -Path .agent | Out-Null

          git diff --name-only "$mergeBase..HEAD" | Out-File -FilePath .agent/changed_files.txt -Encoding utf8
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "Changed files since merge base:"
          Get-Content .agent/changed_files.txt

      - name: Check required reports through acceptance
        env:
          FEATURE_ID: ${{ inputs.feature_id }}
        run: |
          $ErrorActionPreference = "Stop"
          $argsList = @("--through-stage", "acceptance")
          if ($env:FEATURE_ID) {
            $argsList += @("--feature-id", $env:FEATURE_ID)
          }
          python scripts/agent_pipeline.py check-gates @argsList
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python scripts/agent_pipeline.py sync-state-from-gates
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Classify auto-main eligibility
        id: classify
        run: |
          python scripts/agent_pipeline.py classify-changes --changed-files-file .agent/changed_files.txt --fail-on-manual-approval
          $status = $LASTEXITCODE
          "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          exit 0

      - name: Commit gate artifacts
        run: |
          $ErrorActionPreference = "Stop"
          git config user.name "agent-pipeline-bot"
          git config user.email "agent-pipeline-bot@users.noreply.github.com"
          git add .agent/gates .agent/changed_files.txt
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No gate artifacts to commit."
          } else {
            git commit -m "chore(agent): record auto merge gate"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            git push
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Publish user acceptance entry to PR body
        if: inputs.pr_number != '' || github.event.pull_request.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ github.event.pull_request.number || inputs.pr_number }}"
          $sha = git rev-parse HEAD
          $actionsUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          New-Item -ItemType Directory -Force -Path .agent/reports | Out-Null
          python scripts/agent_pipeline_acceptance_entry.py `
            --repository "${{ github.repository }}" `
            --ref $sha `
            --actions-url $actionsUrl `
            --output .agent/reports/pr_acceptance_entry.md
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $entry = Get-Content .agent/reports/pr_acceptance_entry.md -Raw -Encoding utf8
          $body = gh pr view $pr --repo "${{ github.repository }}" --json body --jq ".body"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $pattern = '(?s)\r?\n?<!-- agent-user-acceptance:start -->.*?<!-- agent-user-acceptance:end -->'
          $baseBody = [regex]::Replace([string]$body, $pattern, '').TrimEnd()
          $newBody = "$baseBody`n`n$entry"
          gh pr edit $pr --repo "${{ github.repository }}" --body $newBody
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Require manual approval when gate fails
        if: steps.classify.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ github.event.pull_request.number || inputs.pr_number || '' }}"
          if ($pr) {
            gh pr edit $pr --add-label "stage:manual-approval-required"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh pr comment $pr --body "Merge Gate blocked by safety policy. See .agent/gates/auto_merge_gate.json, acceptance report, and the Pipeline Dashboard artifact in this Actions run. main still requires manual review and merge."
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          Write-Host "Safety policy requires manual approval. PR has been marked. Workflow will not auto-merge."
          exit 0

      - name: Mark PR ready for manual review when gate passes
        if: steps.classify.outputs.status == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $pr = "${{ github.event.pull_request.number || inputs.pr_number || '' }}"
          if (-not $pr) {
            Write-Host "Workflow dispatch without PR context: gate passed, but no PR to label."
            exit 0
          }
          gh pr edit $pr --add-label "stage:manual-approval-required"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          gh pr comment $pr --body "Merge Gate passed basic checks, but this repo prohibits auto-merge of main. This PR requires manual review and merge. See .agent/gates/auto_merge_gate.json and acceptance report before deciding."
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Gate passed. PR still requires manual review and merge."

      - name: Generate Pipeline Diagnostic Report
        if: always()
        run: |
          $ErrorActionPreference = "Continue"
          New-Item -ItemType Directory -Force -Path .agent/reports | Out-Null
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)

          python scripts/agent_pipeline_regression.py --strict --json --output .agent/reports/pipeline_report.json
          $regressionStatus = $LASTEXITCODE

          if (-not (Test-Path .agent/reports/pipeline_report.json) -or (Get-Item .agent/reports/pipeline_report.json).Length -eq 0) {
            $fallback = @{
              status = "fail"
              summary = @{ critical_count = 1; warning_count = 0; info_count = 0 }
              checks = @(@{
                name = "diagnostic_fallback"
                severity = "critical"
                passed = $false
                message = "Pipeline regression report not generated. This is a diagnostic fallback; check the Actions log."
              })
              artifacts = @{ diagnostic_fallback = $true }
            }
            $fallbackJson = $fallback | ConvertTo-Json -Depth 8
            $reportPath = Join-Path (Get-Location) ".agent/reports/pipeline_report.json"
            [System.IO.File]::WriteAllText($reportPath, $fallbackJson, $utf8NoBom)
          }

          python scripts/agent_pipeline_report_viewer.py --input .agent/reports/pipeline_report.json --output .agent/reports/pipeline_dashboard.html
          $viewerStatus = $LASTEXITCODE
          if ($viewerStatus -ne 0 -or -not (Test-Path .agent/reports/pipeline_dashboard.html)) {
            $fallbackHtml = @"
          <!doctype html>
          <html lang="en"><meta charset="utf-8"><title>Pipeline Diagnostic Report</title>
          <body><h1>Pipeline Diagnostic Report</h1><p>Dashboard generation failed. This is a diagnostic fallback; check the JSON artifact and Actions log.</p></body></html>
          "@
            $dashboardPath = Join-Path (Get-Location) ".agent/reports/pipeline_dashboard.html"
            [System.IO.File]::WriteAllText($dashboardPath, $fallbackHtml, $utf8NoBom)
          }

          Write-Host "Regression exit code: $regressionStatus; Dashboard generation exit code: $viewerStatus"
          exit 0

      - name: 上传 Pipeline Dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-dashboard-merge-gate-pr-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}-${{ github.run_id }}
          path: |
            .agent/reports/pipeline_report.json
            .agent/reports/pipeline_dashboard.html
            .agent/gates/*.json
            .agent/changed_files.txt
            .agent/reports/pr_acceptance_entry.md
          if-no-files-found: error
          retention-days: 14
