name: Agent Main Merge Gate

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
  workflow_dispatch:
    inputs:
      feature_id:
        description: Feature ID to check. Defaults to .agent/current_task.yaml.
        required: false
      force_manual_check_only:
        description: Do not merge, only emit gate result
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: read

defaults:
  run:
    shell: bash

jobs:
  merge-gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'stage:merge-ready' ||
      contains(github.event.pull_request.labels.*.name, 'stage:merge-ready')
    runs-on: [self-hosted, Windows, X64, local-windows-codex]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight pipeline dependencies
        run: python -m pip install --upgrade pyyaml

      - name: Collect changed files
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git diff --name-only origin/main...HEAD | tee .agent/changed_files.txt

      - name: Check required reports through acceptance
        env:
          FEATURE_ID: ${{ inputs.feature_id }}
        run: |
          set -euo pipefail
          args=(--through-stage acceptance)
          if [[ -n "${FEATURE_ID:-}" ]]; then args+=(--feature-id "$FEATURE_ID"); fi
          python scripts/agent_pipeline.py check-gates "${args[@]}"

      - name: Classify auto-main eligibility
        id: classify
        run: |
          set +e
          python scripts/agent_pipeline.py classify-changes \
            --changed-files-file .agent/changed_files.txt \
            --fail-on-manual-approval
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit gate artifacts
        run: |
          set -euo pipefail
          git config user.name "agent-pipeline-bot"
          git config user.email "agent-pipeline-bot@users.noreply.github.com"
          git add .agent/gates .agent/changed_files.txt || true
          if git diff --cached --quiet; then
            echo "No gate artifacts to commit."
          else
            git commit -m "chore(agent): record auto merge gate"
            git push
          fi

      - name: Require manual approval when gate fails
        if: steps.classify.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number || '' }}"
          if [[ -n "$pr" ]]; then
            gh pr edit "$pr" --add-label "stage:manual-approval-required"
            gh pr comment "$pr" --body "Auto-main merge blocked by policy. See .agent/gates/auto_merge_gate.json."
          fi
          exit 1

      - name: Auto merge PR to main when allowed
        if: >-
          steps.classify.outputs.status == '0' &&
          inputs.force_manual_check_only != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number || '' }}"
          if [[ -z "$pr" ]]; then
            echo "Workflow dispatch without PR context: gate passed, but no PR to merge."
            exit 0
          fi
          gh pr merge "$pr" --merge --delete-branch --subject "merge(agent): auto-main safe pipeline"
