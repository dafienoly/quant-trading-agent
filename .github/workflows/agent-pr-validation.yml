name: Agent PR 轻量验证

run-name: >-
  PR #${{ github.event.pull_request.number || github.event.inputs.pr_number || 'manual' }} Pipeline 轻量验证

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 要验证的 PR 编号
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: agent-pr-validation-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Pipeline 轻量验证
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
    steps:
      - name: 检出 PR 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装轻量验证依赖
        run: python -m pip install pytest pyyaml

      - name: 同步 main 比较基线
        run: git fetch origin +refs/heads/main:refs/remotes/origin/main --prune

      - name: 运行严格 Pipeline 回归并写入 JSON
        id: regression
        run: |
          mkdir -p .agent/reports
          python scripts/agent_pipeline_regression.py --strict --json --output .agent/reports/pipeline_report.json

      - name: 运行 Pipeline 自动化测试
        id: tests
        if: always()
        run: |
          mkdir -p runtime
          python -m pytest tests/test_agent_pipeline_automation.py tests/test_agent_pipeline_regression.py -q --basetemp=runtime/pytest-tmp-agent-pr-validation

      - name: 检查 Git diff 格式
        id: diff_check
        if: always()
        run: git diff --check

      - name: 检查交易敏感模块
        id: restricted
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          changed_files="$(git diff --name-only origin/main...HEAD)"
          printf '%s\n' "$changed_files"
          if printf '%s\n' "$changed_files" | grep -Eiq '(^|/)(src/(broker|execution|execution_engine|order|account|risk|risk_engine)/|miniQMT/|integrations/miniqmt/)|miniqmt|live[_ -]?trading|real[_ -]?order'; then
            echo "检测到交易敏感模块改动，PR validation 按安全策略阻断。" >&2
            exit 2
          fi

      - name: 检查临时 Pipeline 产物未被跟踪
        id: tracked_files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          tracked_files="$(git ls-files .agent/tmp .agent/reports)"
          if [ -n "$tracked_files" ]; then
            echo "以下运行期文件不应被 Git 跟踪：" >&2
            printf '%s\n' "$tracked_files" >&2
            exit 2
          fi

      - name: 运行 PR 报告门禁校验
        id: report_gate
        if: always()
        env:
          BASE_REF: origin/main
        run: |
          python scripts/validate_pr_reports.py --base ${{ env.BASE_REF }} --head HEAD --strict --output .agent/reports/pr_report_gate.json --json
          echo "exit=$?" >> $GITHUB_OUTPUT
          echo "outcome=${{ job.status }}" >> $GITHUB_OUTPUT

      - name: 生成 Pipeline 诊断报告
        if: always()
        env:
          REGRESSION_OUTCOME: ${{ steps.regression.outcome }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          DIFF_OUTCOME: ${{ steps.diff_check.outcome }}
          RESTRICTED_OUTCOME: ${{ steps.restricted.outcome }}
          TRACKED_OUTCOME: ${{ steps.tracked_files.outcome }}
          REPORT_GATE_OUTCOME: ${{ steps.report_gate.outcome }}
        shell: bash
        run: |
          mkdir -p .agent/reports
          if [ ! -s .agent/reports/pipeline_report.json ]; then
            cat > .agent/reports/pipeline_report.json <<'JSON'
          {
            "status": "fail",
            "summary": {
              "critical_count": 1,
              "warning_count": 0,
              "info_count": 0
            },
            "checks": [
              {
                "name": "diagnostic_fallback",
                "severity": "critical",
                "passed": false,
                "message": "正式回归报告未生成；这是诊断 fallback，请查看 Actions 日志。"
              }
            ],
            "artifacts": {
              "diagnostic_fallback": true
            }
          }
          JSON
          fi

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(".agent/reports/pipeline_report.json")
          try:
              report = json.loads(report_path.read_text(encoding="utf-8"))
          except (json.JSONDecodeError, OSError) as exc:
              report = {
                  "status": "fail",
                  "summary": {},
                  "checks": [{
                      "name": "diagnostic_report_load",
                      "severity": "critical",
                      "passed": False,
                      "message": f"无法读取正式回归报告；这是诊断记录：{exc}",
                  }],
                  "artifacts": {"diagnostic_fallback": True},
              }

          outcomes = {
              "strict_regression": os.environ.get("REGRESSION_OUTCOME", "unknown"),
              "target_pytest": os.environ.get("TEST_OUTCOME", "unknown"),
              "git_diff_check": os.environ.get("DIFF_OUTCOME", "unknown"),
              "restricted_paths": os.environ.get("RESTRICTED_OUTCOME", "unknown"),
              "tracked_runtime_files": os.environ.get("TRACKED_OUTCOME", "unknown"),
              "report_gate": os.environ.get("REPORT_GATE_OUTCOME", "unknown"),
          }
          checks = [
              check for check in report.get("checks", [])
              if not str(check.get("name", "")).startswith("github_step_")
          ]
          for name, outcome in outcomes.items():
              severity = "critical" if name != "git_diff_check" else "warning"
              checks.append({
                  "name": f"github_step_{name}",
                  "severity": severity,
                  "passed": outcome == "success",
                  "message": f"GitHub Actions 步骤结果：{outcome}",
              })

          report["checks"] = checks
          if any(outcome != "success" for outcome in outcomes.values()):
              report["status"] = "fail"
          report["summary"] = {
              "critical_count": sum(
                  1 for check in checks
                  if check.get("severity") == "critical" and not check.get("passed")
              ),
              "warning_count": sum(
                  1 for check in checks
                  if check.get("severity") == "warning" and not check.get("passed")
              ),
              "info_count": sum(1 for check in checks if check.get("severity") == "info"),
          }
          report.setdefault("artifacts", {})["workflow_step_outcomes"] = outcomes
          report_path.write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

          set +e
          python scripts/agent_pipeline_report_viewer.py \
            --input .agent/reports/pipeline_report.json \
            --output .agent/reports/pipeline_dashboard.html
          viewer_status=$?
          set -e

          if [ "$viewer_status" -ne 0 ] || [ ! -s .agent/reports/pipeline_dashboard.html ]; then
            cat > .agent/reports/pipeline_dashboard.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN"><meta charset="utf-8"><title>Pipeline 诊断报告</title>
          <body><h1>Pipeline 诊断报告</h1><p>正式 Dashboard 生成失败；这是诊断 fallback，请查看同一 artifact 中的 JSON 与 Actions 日志。</p></body></html>
          HTML
          fi

      - name: 上传 Pipeline Dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-dashboard-pr-${{ env.PR_NUMBER || github.run_id }}-${{ github.run_id }}
          path: |
            .agent/reports/pipeline_report.json
            .agent/reports/pipeline_dashboard.html
            .agent/reports/pr_report_gate.json
            .agent/gates/*.json
          if-no-files-found: error
          retention-days: 14

      - name: 更新 PR Dashboard 查看说明
        if: always() && env.PR_NUMBER != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: pipeline-dashboard-pr-${{ env.PR_NUMBER }}-${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          marker='<!-- agent-pipeline-dashboard -->'
          body="$(cat <<EOF
          $marker
          ## 查看 Pipeline Dashboard

          本次 PR 验证已生成 JSON 报告和静态 HTML Dashboard。

          查看路径：打开本 PR 的 **Checks / Actions**，进入最新的 **Agent PR 轻量验证** 运行，在 **Artifacts** 中选择 \`$ARTIFACT_NAME\`，查看 \`pipeline_dashboard.html\` 和 \`pipeline_report.json\`。

          Dashboard artifact 仅用于诊断和人工审阅，不代表 PR 已获准合并；main 仍需人工审阅和手动合并。
          EOF
          )"

          existing_id="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --paginate --jq '.[] | select(.user.type == "Bot" and (.body | contains("<!-- agent-pipeline-dashboard -->"))) | .id' | head -n 1)"
          if [ -n "$existing_id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$existing_id" -f body="$body" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$body"
          fi
