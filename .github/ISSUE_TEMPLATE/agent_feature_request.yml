name: Agent Feature Request
description: Start the Issue-driven Agent development pipeline.
title: "[Feature] "
labels:
  - agent:pipeline
  - stage:pm-pending
body:
  - type: textarea
    id: user_goal
    attributes:
      label: User Goal
      description: Describe the feature, workflow, or bugfix you want the Agent pipeline to deliver.
      placeholder: "Example: 接入腾讯实时行情 Provider，并用实时快照聚合当天 1 分钟 K。"
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and Non-Goals
      description: Safety, scope, data-source, trading, or deployment constraints.
      placeholder: "Example: 不允许真实自动下单；东财只做 fallback；必须保留人工确认。"
    validations:
      required: true
  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - docs-only
        - test-only
        - data-provider
        - dashboard
        - ordinary-api
        - trading-sensitive
        - live-trading
    validations:
      required: true
  - type: checkboxes
    id: automation_mode
    attributes:
      label: Automation Mode
      options:
        - label: Run Codex A PM -> Codex B Architect -> OpenCode Lead -> OpenCode Developer -> OpenCode Test Engineer -> Codex B Review -> Codex A Acceptance automatically.
          required: true
        - label: Route every passed OpenCode Test Engineer phase back to OpenCode Developer until all planned phases are tested, then run OpenCode Lead review.
          required: true
        - label: Require human review and manual main merge after all deterministic gates pass.
          required: true
        - label: Require manual approval for trading-sensitive modules even if full automation is requested.
          required: true
